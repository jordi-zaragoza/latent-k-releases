name = "latent-k-payments"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "LICENSES"
id = "e5218c6720204dada0ff3a6433ad5af6"

# Environment variables (set secrets with: wrangler secret put <NAME>)
# Required secrets:
# - STRIPE_SECRET_KEY
# - STRIPE_WEBHOOK_SECRET
# - STRIPE_PRICE_MONTHLY
# - STRIPE_PRICE_YEARLY
# - LICENSE_PRIVATE_KEY    (RSA private key in PEM format for signing licenses)
# - ADMIN_USER             (Admin username for dashboard)
# - ADMIN_PASS             (Admin password for dashboard)
# - NODE_SERVER_TOKEN      (Optional: for backward compatibility)

[vars]
CORS_ORIGIN = "https://latent-k.pages.dev"
