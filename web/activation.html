<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>LATENT-K Activation</title><style>:root {--bg-primary: #0a0a0f;--bg-secondary: #12121a;--bg-tertiary: #1a1a24;--text-primary: #e0e0e8;--text-secondary: #8888a0;--accent-green: #00ff88;--accent-cyan: #00d4ff;--accent-purple: #a855f7;--accent-yellow: #ffd700;--border-color: #2a2a3a;--glow-green: rgba(0, 255, 136, 0.15);--glow-cyan: rgba(0, 212, 255, 0.15);}* {margin: 0;padding: 0;box-sizing: border-box;}body {font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;background: var(--bg-primary);color: var(--text-primary);min-height: 100vh;display: flex;flex-direction: column;align-items: center;justify-content: center;padding: 2rem;background-image:radial-gradient(ellipse at top, rgba(0, 212, 255, 0.03) 0%, transparent 50%),radial-gradient(ellipse at bottom, rgba(168, 85, 247, 0.03) 0%, transparent 50%);}.container {max-width: 480px;width: 100%;}/* Header */.header {text-align: center;margin-bottom: 2.5rem;}.logo {font-size: 2rem;font-weight: 700;letter-spacing: 0.05em;color: var(--text-primary);margin-bottom: 0.5rem;}.logo .delim {background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));-webkit-background-clip: text;-webkit-text-fill-color: transparent;background-clip: text;}.tagline {font-size: 0.875rem;color: var(--text-secondary);font-weight: 400;}/* Main Card */.card {background: var(--bg-secondary);border: 1px solid var(--border-color);border-radius: 16px;padding: 2rem;}.card-header {margin-bottom: 1.5rem;padding-bottom: 1rem;border-bottom: 1px solid var(--border-color);}.card-header h2 {font-size: 1.125rem;font-weight: 600;color: var(--text-primary);}.card-header p {font-size: 0.8rem;color: var(--text-secondary);margin-top: 0.25rem;}/* Form Styles */.form-group {margin-bottom: 1.25rem;}.form-label {display: block;font-size: 0.75rem;font-weight: 500;color: var(--text-secondary);margin-bottom: 0.5rem;text-transform: uppercase;letter-spacing: 0.05em;}.form-input {width: 100%;padding: 0.875rem 1rem;background: var(--bg-tertiary);border: 1px solid var(--border-color);border-radius: 8px;color: var(--text-primary);font-family: inherit;font-size: 0.9rem;transition: all 0.2s ease;}.form-input:focus {outline: none;border-color: var(--accent-cyan);box-shadow: 0 0 0 3px var(--glow-cyan);}.form-input::placeholder {color: var(--text-secondary);opacity: 0.6;}.form-hint {font-size: 0.75rem;color: var(--accent-cyan);margin-top: 0.5rem;opacity: 0.9;}/* Plan Selection */.plans {display: grid;grid-template-columns: repeat(3, 1fr);gap: 0.75rem;margin-bottom: 1.5rem;}.plan-option {position: relative;}.plan-option input {position: absolute;opacity: 0;cursor: pointer;}.plan-card {display: block;padding: 1.25rem;background: var(--bg-tertiary);border: 2px solid var(--border-color);border-radius: 12px;cursor: pointer;transition: all 0.2s ease;}.plan-option input:checked + .plan-card {border-color: var(--accent-green);box-shadow: 0 0 0 3px var(--glow-green);}.plan-card:hover {border-color: var(--text-secondary);}.plan-card.trial-card .plan-price {color: var(--accent-green);}.plan-name {font-size: 0.85rem;font-weight: 600;margin-bottom: 0.5rem;color: var(--text-primary);}.plan-price {font-size: 1.5rem;font-weight: 700;color: var(--accent-cyan);}.plan-price span {font-size: 0.75rem;font-weight: 400;color: var(--text-secondary);}.plan-features {margin-top: 0.75rem;padding-top: 0.75rem;border-top: 1px solid var(--border-color);}.plan-feature {font-size: 0.75rem;color: var(--text-secondary);margin-bottom: 0.25rem;padding-left: 1rem;position: relative;}.plan-feature::before {content: '';position: absolute;left: 0;top: 0.4em;width: 4px;height: 4px;background: var(--accent-green);border-radius: 50%;}/* Submit Button */.btn-submit {width: 100%;padding: 1rem;background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));border: none;border-radius: 10px;color: white;font-family: inherit;font-size: 0.9rem;font-weight: 600;cursor: pointer;transition: all 0.3s ease;position: relative;overflow: hidden;}.btn-submit:hover {transform: translateY(-2px);box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);}.btn-submit:active {transform: translateY(0);}/* Activation Key Display */.key-display {display: none;margin-top: 1.5rem;padding: 1.5rem;background: var(--bg-tertiary);border: 1px solid var(--accent-green);border-radius: 12px;text-align: center;}.key-display.active {display: block;animation: fadeIn 0.3s ease;}@keyframes fadeIn {from { opacity: 0; transform: translateY(-10px); }to { opacity: 1; transform: translateY(0); }}.key-display .label {font-size: 0.75rem;color: var(--text-secondary);margin-bottom: 0.75rem;text-transform: uppercase;letter-spacing: 0.05em;}.key-value {font-family: 'JetBrains Mono', 'Fira Code', monospace;font-size: 1rem;color: var(--accent-green);letter-spacing: 0.15em;word-break: break-all;padding: 0.75rem;background: var(--bg-primary);border-radius: 8px;font-weight: 500;}.copy-btn {margin-top: 1rem;padding: 0.625rem 1.5rem;background: transparent;border: 1px solid var(--accent-green);border-radius: 6px;color: var(--accent-green);font-family: inherit;font-size: 0.8rem;font-weight: 500;cursor: pointer;transition: all 0.2s ease;}.copy-btn:hover {background: var(--accent-green);color: var(--bg-primary);}/* Footer */.footer {margin-top: 2rem;text-align: center;font-size: 0.75rem;color: var(--text-secondary);}/* Status Message */.status {display: none;padding: 0.875rem 1rem;margin-top: 1rem;font-size: 0.8rem;border-radius: 8px;}.status.error {display: block;border: 1px solid #ff4444;color: #ff4444;background: rgba(255, 68, 68, 0.1);}.status.success {display: block;border: 1px solid var(--accent-green);color: var(--accent-green);background: var(--glow-green);}/* Loading State */.loading .btn-submit {pointer-events: none;opacity: 0.7;}.spinner {display: none;width: 18px;height: 18px;border: 2px solid rgba(255,255,255,0.3);border-top-color: white;border-radius: 50%;animation: spin 0.8s linear infinite;margin: 0 auto;}.loading .spinner {display: inline-block;}.loading .btn-text {display: none;}@keyframes spin {to { transform: rotate(360deg); }}/* Responsive */@media (max-width: 600px) {.plans {grid-template-columns: 1fr;}.card {padding: 1.5rem;}}</style></head><body><div class="container"><header class="header"><h1 class="logo"><span class="delim">⦓</span> LATENT-K <span class="delim">⦔</span></h1><p class="tagline">Intelligent Context Management</p></header><main class="card"><div class="card-header"><h2>Request Activation Key</h2><p>Get started with your personal license</p></div><form id="activationForm"><div class="form-group"><label class="form-label">Email Address</label><inputtype="email"class="form-input"id="email"placeholder="you@example.com"required><p class="form-hint">Must match the email configured in Claude Code</p></div><div class="form-group"><label class="form-label">Full Name</label><inputtype="text"class="form-input"id="name"placeholder="Your name"required></div><div class="form-group"><label class="form-label">Select Plan</label><div class="plans"><label class="plan-option"><input type="radio" name="plan" value="trial14" checked><div class="plan-card trial-card"><div class="plan-name">Free Trial</div><div class="plan-price">$0</div><div class="plan-features"><div class="plan-feature">14 days free</div><div class="plan-feature">All features</div><div class="plan-feature">No credit card</div></div></div></label><label class="plan-option"><input type="radio" name="plan" value="monthly"><div class="plan-card"><div class="plan-name">Monthly</div><div class="plan-price">$9</div><div class="plan-features"><div class="plan-feature">+30 days (extends)</div><div class="plan-feature">One-time payment</div><div class="plan-feature">Email support</div></div></div></label><label class="plan-option"><input type="radio" name="plan" value="yearly"><div class="plan-card"><div class="plan-name">Yearly</div><div class="plan-price">$79</div><div class="plan-features"><div class="plan-feature">+365 days (extends)</div><div class="plan-feature">One-time payment</div><div class="plan-feature">Priority support</div></div></div></label></div></div><button type="submit" class="btn-submit"><span class="btn-text">Start Free Trial</span><span class="spinner"></span></button><div class="status" id="status"></div></form><div class="key-display" id="keyDisplay"><div class="label">Your Activation Key</div><div class="key-value" id="keyValue">LK-XXXX-XXXX-XXXX-XXXX</div><button class="copy-btn" onclick="copyKey()">Copy Key</button></div></main><footer class="footer"><p>LATENT-K v1.4.7</p></footer></div><script>// Configuration - Payments Worker URLconst PAYMENTS_API = 'https://latent-k-payments.latent-k.workers.dev';const form = document.getElementById('activationForm');const status = document.getElementById('status');const keyDisplay = document.getElementById('keyDisplay');const keyValue = document.getElementById('keyValue');// Check for return from Stripe checkoutasync function checkStripeReturn() {const params = new URLSearchParams(window.location.search);const success = params.get('success');const canceled = params.get('canceled');const sessionId = params.get('session_id');if (canceled) {status.className = 'status error';status.textContent = 'Payment was canceled. You can try again when ready.';// Clean URLwindow.history.replaceState({}, '', window.location.pathname);return;}if (success && sessionId) {// Show loading while fetching licenseform.classList.add('loading');status.className = 'status success';status.textContent = 'Payment successful! Retrieving your license...';// Poll for license (webhook may take a moment)let attempts = 0;const maxAttempts = 10;const pollInterval = 2000;const pollForLicense = async () => {try {const response = await fetch(`${PAYMENTS_API}/api/license?session_id=${sessionId}`);const data = await response.json();if (response.ok && data.key) {// Got the license!keyValue.textContent = data.key;keyDisplay.classList.add('active');const expiresDate = data.expires ? new Date(data.expires).toLocaleDateString() : 'N/A';const planLabel = data.plan === 'monthly' ? 'Monthly' : 'Yearly';status.className = 'status success';status.textContent = `${planLabel} license activated for ${data.email}. Valid until ${expiresDate}.`;form.classList.remove('loading');// Clean URLwindow.history.replaceState({}, '', window.location.pathname);return;}// Not ready yet, retryattempts++;if (attempts < maxAttempts) {setTimeout(pollForLicense, pollInterval);} else {status.className = 'status error';status.textContent = 'License is being processed. Please check back in a few minutes or contact support.';form.classList.remove('loading');}} catch (error) {attempts++;if (attempts < maxAttempts) {setTimeout(pollForLicense, pollInterval);} else {status.className = 'status error';status.textContent = 'Unable to retrieve license. Please contact support with your session ID: ' + sessionId;form.classList.remove('loading');}}};pollForLicense();}}// Run on page loadcheckStripeReturn();form.addEventListener('submit', async (e) => {e.preventDefault();const email = document.getElementById('email').value;const name = document.getElementById('name').value;const plan = document.querySelector('input[name="plan"]:checked').value;// Start loading stateform.classList.add('loading');status.className = 'status';status.textContent = '';keyDisplay.classList.remove('active');try {if (plan === 'trial14') {// Trial: use Worker endpoint (proxies to Node.js server)const response = await fetch(`${PAYMENTS_API}/api/trial`, {method: 'POST',headers: { 'Content-Type': 'application/json' },body: JSON.stringify({ email, name, plan })});const data = await response.json();if (!response.ok) {// Special handling when user already has a keyif (response.status === 409 && data.existingKey) {keyValue.textContent = data.existingKey;keyDisplay.classList.add('active');status.className = 'status success';status.textContent = 'You already have a license. Here is your key:';form.classList.remove('loading');return;}throw new Error(data.error || 'Failed to generate key');}// Show successkeyValue.textContent = data.key;keyDisplay.classList.add('active');const expiresDate = data.expires ? new Date(data.expires).toLocaleDateString() : 'N/A';status.className = 'status success';status.textContent = `Trial license generated for ${data.email}. Valid until ${expiresDate}.`;form.classList.remove('loading');} else {// Paid plan: redirect to Stripe Checkout via Workerstatus.className = 'status success';status.textContent = 'Redirecting to secure checkout...';const response = await fetch(`${PAYMENTS_API}/api/checkout`, {method: 'POST',headers: { 'Content-Type': 'application/json' },body: JSON.stringify({ email, name, plan })});const data = await response.json();if (!response.ok) {throw new Error(data.error || 'Failed to create checkout session');}// Redirect to Stripe Checkoutwindow.location.href = data.url;}} catch (error) {status.className = 'status error';status.textContent = error.message || 'Failed to process request. Please try again.';form.classList.remove('loading');}});function copyKey() {const key = keyValue.textContent;navigator.clipboard.writeText(key).then(() => {const btn = document.querySelector('.copy-btn');const original = btn.textContent;btn.textContent = 'Copied!';setTimeout(() => {btn.textContent = original;}, 2000);});}// Update button text based on selected planconst btnText = document.querySelector('.btn-text');document.querySelectorAll('input[name="plan"]').forEach(radio => {radio.addEventListener('change', () => {if (radio.value === 'trial14') {btnText.textContent = 'Start Free Trial';} else if (radio.value === 'monthly') {btnText.textContent = 'Pay $9 - One month';} else {btnText.textContent = 'Pay $79 - One year';}});});</script></body></html>
