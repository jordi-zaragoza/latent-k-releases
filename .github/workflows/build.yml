name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build binaries
        run: node scripts/build.js --all

      - name: Create install script
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cat > dist/install.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          VERSION="__VERSION__"
          REPO="jordi-zaragoza/latent-k-releases"

          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          case "$OS" in
            linux*)  BINARY="lk-linux" ;;
            darwin*) BINARY="lk-macos" ;;
            *)       echo "Unsupported OS: $OS"; exit 1 ;;
          esac

          URL="https://github.com/$REPO/releases/download/$VERSION/$BINARY"
          INSTALL_DIR="/usr/local/bin"

          echo "Installing lk $VERSION..."
          sudo curl -fsSL "$URL" -o "$INSTALL_DIR/lk"
          sudo chmod +x "$INSTALL_DIR/lk"
          echo "Installed to $INSTALL_DIR/lk"
          lk --version
          SCRIPT
          sed -i "s/__VERSION__/$VERSION/" dist/install.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            dist/lk-linux
            dist/lk-macos
            dist/lk-win.exe
            dist/install.sh

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - uses: actions/checkout@v4
        with:
          path: source

      - name: Push to releases repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          # Clone releases repo
          git clone https://x-access-token:${GH_TOKEN}@github.com/jordi-zaragoza/latent-k-releases.git releases
          cd releases

          # Update README with current version
          sed "s/{{VERSION}}/$VERSION/g" ../source/README.md > README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update README for $VERSION"
          git push

          # Delete existing release if exists (for forced tags)
          gh release delete $VERSION --yes 2>/dev/null || true

          # Create release using gh CLI
          gh release create $VERSION \
            ../dist/lk-linux \
            ../dist/lk-macos \
            ../dist/lk-win.exe \
            ../dist/install.sh \
            --title "lk $VERSION" \
            --notes "Automated release from lk repo"
